<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Fun, kid-friendly learning games including math and U.S. states practice." />
  <link rel="canonical" href="https://yardleyfun.com/" />

  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Yardley Fun" />
  <meta property="og:title" content="Kids Games | Yardley Fun" />
  <meta property="og:description" content="Fun, kid-friendly learning games including math and U.S. states practice." />
  <meta property="og:url" content="https://yardleyfun.com/" />
  <meta property="og:image" content="https://yardleyfun.com/preview.png" />
  <meta property="og:image:alt" content="Preview image for Yardley Fun kids games." />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Kids Games | Yardley Fun" />
  <meta name="twitter:description" content="Fun, kid-friendly learning games including math and U.S. states practice." />
  <meta name="twitter:image" content="https://yardleyfun.com/preview.png" />
  <title>Kids Games</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#1f2933;
      --muted:#5b6770;
      --line:#e5e8ec;
      --accent:#2f7af8;
      --accent-dark:#1e5fca;
      --shadow: 0 18px 40px rgba(17, 24, 39, .12);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh;
      display:flex; align-items:center; justify-content:center;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 10% 0%, rgba(47,122,248,.08), transparent 55%),
        radial-gradient(900px 600px at 100% 0%, rgba(47,122,248,.08), transparent 50%),
        var(--bg);
      padding: 24px;
    }
    .card{
      width:min(720px, 96vw);
      background:var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      padding: 28px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      border-bottom:1px solid var(--line);
      padding-bottom:14px;
    }
    h1{ margin:0; font-size: clamp(22px, 3vw, 30px); letter-spacing:.2px; }
    .subtitle{ margin:0; color:var(--muted); font-size: clamp(14px, 2.2vw, 16px); }
    .badge{
      font-size:12px; font-weight:600; color:var(--accent-dark);
      background: rgba(47,122,248,.12);
      padding:6px 10px; border-radius:999px;
    }
    .buttons{
      display:grid; gap:12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    a.btn{
      display:flex; align-items:center; justify-content:space-between;
      padding: 14px 16px; border-radius: 12px; font-weight:600; font-size:16px;
      text-decoration:none; color:var(--text);
      background: #f9fafb;
      border:1px solid var(--line);
      transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
      gap:12px;
    }
    a.btn:hover{
      transform: translateY(-2px);
      border-color: #cdd6e0;
      box-shadow: 0 8px 16px rgba(17, 24, 39, .08);
    }
    .btn .meta{ color:var(--muted); font-size:13px; font-weight:500; }
    .btn .label{ display:flex; align-items:center; gap:12px; }
    .icon{
      width:28px; height:28px; flex:0 0 28px;
      color: var(--accent-dark);
    }
    .icon svg{ width:100%; height:100%; display:block; }
    .btn .arrow{
      width:28px; height:28px; border-radius:50%;
      display:inline-flex; align-items:center; justify-content:center;
      color:white; background: var(--accent);
      font-size:16px; font-weight:700;
    }
    .footer{
      display:flex; justify-content:space-between; align-items:center;
      color:var(--muted); font-size:12px; border-top:1px solid var(--line);
      padding-top:12px;
    }
    .footer a{ color:var(--accent-dark); text-decoration:none; }
  </style>
</head>
<body>
  <main class="card">
    <header>
      <div>
        <h1>Kids Games</h1>
        <p class="subtitle">Choose a game to play.</p>
      </div>
      <div class="badge">Safe &amp; Kid‑Friendly</div>
    </header>

    <section class="buttons" aria-label="Games">
      <a class="btn" href="football-math.html">
        <span class="label">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <g transform="rotate(-20 12 12)">
                <ellipse cx="12" cy="12" rx="8.5" ry="5.5"/>
                <line x1="6.5" y1="12" x2="17.5" y2="12"/>
                <line x1="9.5" y1="10.9" x2="9.5" y2="13.1"/>
                <line x1="12" y1="10.6" x2="12" y2="13.4"/>
                <line x1="14.5" y1="10.9" x2="14.5" y2="13.1"/>
              </g>
            </svg>
          </span>
          <span>
          Football Math<br />
          <span class="meta">Multiplication &amp; division skills</span>
          </span>
        </span>
        <span class="arrow">→</span>
      </a>
      <a class="btn" href="bunny-math.html">
        <span class="label">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 9c-1.5-3 .2-5 2-5s2.5 1.8 2.5 3.8"/>
              <path d="M17 9c1.5-3-.2-5-2-5s-2.5 1.8-2.5 3.8"/>
              <circle cx="12" cy="14" r="5.5"/>
              <path d="M9.5 14.5h.01M14.5 14.5h.01"/>
              <path d="M11 16.5c.8.6 1.2.6 2 0"/>
            </svg>
          </span>
          <span>
          Bunny Addition<br />
          <span class="meta">Simple sums &amp; differences</span>
          </span>
        </span>
        <span class="arrow">→</span>
      </a>
      <a class="btn" href="us-states-quiz.html">
        <span class="label">
          <span class="icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="5" width="18" height="14" rx="1.5"/>
              <path d="M3 9h18M3 13h18M3 17h18"/>
              <rect x="3" y="5" width="8" height="6" fill="currentColor" stroke="none"/>
              <path d="M5 7.2h.01M7 7.2h.01M9 7.2h.01M5 9.3h.01M7 9.3h.01M9 9.3h.01"/>
            </svg>
          </span>
          <span>
          USA States &amp; Capitals<br />
          <span class="meta">Geography quiz</span>
          </span>
        </span>
        <span class="arrow">→</span>
      </a>
    </section>

    <div class="footer">
      <span>Made for learning and fun.</span>
      <a href="index.html">Home</a>
    </div>
  </main>
</body>
</html>
