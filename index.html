<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kids Games</title>
  <style>
    :root{
      --bg1:#0b3d2e; --bg2:#f7fffb; --card:#ffffff;
      --text:#0a1b12; --muted:#4b5b52; --shadow: 0 16px 38px rgba(0,0,0,.18);
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(255,255,255,.7), transparent),
        radial-gradient(900px 600px at 85% 20%, rgba(255,255,255,.5), transparent),
        linear-gradient(135deg, #e9fff7, var(--bg2));
      padding: 18px;
    }
    .card{
      width:min(680px, 96vw);
      background:var(--card);
      border-radius: 18px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,.08);
      padding: 20px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    h1{ margin:0; font-size: clamp(24px, 3.2vw, 34px); }
    p{ margin:0; color:var(--muted); }
    .buttons{ display:flex; gap:12px; flex-wrap:wrap; }
    a.btn{
      display:inline-flex; align-items:center; justify-content:center;
      padding: 14px 16px; border-radius: 14px; font-weight:900; font-size:18px;
      text-decoration:none; color:#0a1b12;
      background: linear-gradient(180deg, #ffe8a3, #ffd36d);
      box-shadow: 0 12px 24px rgba(0,0,0,.12);
      border:1px solid rgba(0,0,0,.08);
    }
    a.btn.bunny{
      background: linear-gradient(180deg, #ffe6f1, #ffd3e6);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kids Games</h1>
    <p>Choose a game to play.</p>
    <div class="buttons">
      <a class="btn" href="football-math.html">Football Math</a>
      <a class="btn bunny" href="bunny-math.html">Bunny Addition</a>
      <a class="btn" href="us-states-quiz.html">USA States &amp; Capitals</a>
    </div>
  </div>
</body>
</html>
